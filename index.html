<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игра: Змея</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ccc;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 600px;
            max-height: 100vh;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-text {
            position: absolute;
            top: 12px;
            left: 12px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            font-weight: 700;
            font-size: 16px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        .lives-text {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #ff69b4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            font-weight: 700;
            font-size: 16px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            z-index: 20;
        }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { font-size: 18px; margin-bottom: 24px; }
        button {
            padding: 14px 28px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background: #3d8b40; }
        .loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 30;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui-text">Цель: 30 ягод | Собрано: <span id="score">0</span></div>
        <div class="lives-text">❤️<span id="lives">5</span></div>
        <canvas id="game"></canvas>

        <div id="gameover" class="overlay">
            <h1>Игра окончена</h1>
            <p>Вы набрали: <span id="final-score">0</span> очков</p>
            <button onclick="resetGame()">Играть снова</button>
        </div>

        <div id="win" class="overlay">
            <h1>Победа!</h1>
            <p>Вы собрали 30 ягод!</p>
            <button onclick="resetGame()">Играть снова</button>
        </div>

        <div id="loading" class="loading-screen">
            Загрузка спрайтов...
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('final-score');
        const gameoverEl = document.getElementById('gameover');
        const winEl = document.getElementById('win');
        const loadingEl = document.getElementById('loading');

        // Загрузка спрайтов из папки Images
        const sprites = {
            bg: null,
            player: null,
            fire: null
        };

        function loadAssets(callback) {
            const names = [
                { key: 'bg', path: 'Images/фон.PNG' },
                { key: 'player', path: 'Images/Змея.PNG' },
                { key: 'fire', path: 'Images/огонь.PNG' }
            ];
            let loaded = 0;

            names.forEach(item => {
                sprites[item.key] = new Image();
                sprites[item.key].onload = () => {
                    loaded++;
                    if (loaded === names.length) callback();
                };
                sprites[item.key].onerror = () => {
                    console.error('Не удалось загрузить:', item.path);
                    // Можно показать ошибку пользователю, если критично
                };
                sprites[item.key].src = item.path;
            });
        }

        // Игрок
        const player = {
            x: 0, y: 0, w: 40, h: 40,
            speed: 8,
            targetX: null, targetY: null,
            draw() {
                if (!sprites.player) return;
                // Рисуем спрайт игрока
                ctx.drawImage(sprites.player, this.x, this.y, this.w, this.h);
            },
            update() {
                if (this.targetX !== null && this.targetY !== null) {
                    const dx = this.targetX - (this.x + 20);
                    const dy = this.targetY - (this.y + 20);
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist > this.speed) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                    } else {
                        this.x = this.targetX - 20;
                        this.y = this.targetY - 20;
                        this.targetX = null;
                        this.targetY = null;
                    }
                }
            }
        };

        const logs = [];
        let strawberry = null;

        let score = 0;
        let lives = 5;
        let frame = 0;
        let gameActive = true;
        const targetScore = 30;

        function handleInput(e) {
            if (!gameActive) return;

            let cx, cy;
            if (e.type === 'touchstart') {
                e.preventDefault();
                cx = e.touches.clientX;
                cy = e.touches.clientY;
            } else {
                cx = e.clientX;
                cy = e.clientY;
            }

            const rect = canvas.getBoundingClientRect();
            const clickX = cx - rect.left;
            const clickY = cy - rect.top;

            const dx = clickX - (player.x + 20);
            const dy = clickY - (player.y + 20);
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 20) {
                player.targetX = clickX;
                player.targetY = clickY;
            }
        }

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', handleInput, {passive: false});

        function spawnLog() {
            const w = 100 + Math.random() * 100;
            const x = Math.random() * (canvas.width - w);
            logs.push({ x, y: -40, w, h: 30, speed: 3 + Math.random() * 2 });
        }
        function spawnStrawberry() {
            const margin = 40;
            const x = margin + Math.random() * (canvas.width - margin * 2 - 30);
            const y = margin + Math.random() * (canvas.height - margin * 2 - 30);
            strawberry = { x, y, w: 30, h: 30 };
        }

        function drawBackground() {
            // Если фон загружен — рисуем его на весь экран
            if (sprites.bg) {
                ctx.drawImage(sprites.bg, 0, 0, canvas.width, canvas.height);
            } else {
                // Заглушка, если фон не загрузился
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function rectIntersect(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                   a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function update() {
            if (!gameActive) return;
            player.update();

            frame++;
            if (frame % 80 === 0) spawnLog();

            for (let i = logs.length - 1; i >= 0; i--) {
                const l = logs[i];
                l.y += l.speed;

                if (rectIntersect(player, l)) {
                    const px = player.x + 20;
                    const py = player.y + 20;
                    const lx = l.x + l.w / 2;
                    const ly = l.y + l.h / 2;

                    const dx = px - lx;
                    const dy = py - ly;
                    const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));

                    const push = 55;
                    player.x += (dx / dist) * push;
                    player.y += (dy / dist) * push;

                    logs.splice(i, 1);
                } else if (l.y > canvas.height) {
                    logs.splice(i, 1);
                }
            }

            // Огонь (упрощённо: создаём его прямо в update для примера)
            // В полноценной игре огонь лучше хранить в массиве, как брёвна
            // Здесь для наглядности просто проверяем «опасные зоны» или можно добавить массив fires аналогично брёвнам
            // Чтобы не усложнять, оставим огонь как часть логики столкновений с брёвнами/зонами.
            // Если хочешь именно спрайт огня — скажи, добавлю массив fires с drawImage(sprites.fire...)

            if (strawberry && rectIntersect(player, strawberry)) {
                score++;
                scoreEl.innerText = score;
                spawnStrawberry();
                if (score >= targetScore) winGame();
            }
        }

        function draw() {
            drawBackground();

            // Брёвна
            ctx.fillStyle = '#8B4513';
            logs.forEach(l => ctx.fillRect(l.x, l.y, l.w, l.h));

            // Ягода
            if (strawberry) {
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath();
                ctx.arc(strawberry.x + 15, strawberry.y + 15, 15, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath();
                ctx.moveTo(strawberry.x + 15, strawberry.y);
                ctx.lineTo(strawberry.x + 5, strawberry.y - 10);
                ctx.lineTo(strawberry.x + 25, strawberry.y - 10);
                ctx.fill();
            }

            player.draw();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function endGame() {
            gameActive = false;
            finalScoreEl.innerText = score;
            gameoverEl.style.display = 'flex';
        }

        function winGame() {
            gameActive = false;
            winEl.style.display = 'flex';
        }

        function resetGame() {
            score = 0;
            lives = 5;
            logs.length = 0;
            strawberry = null;
            frame = 0;
            scoreEl.innerText = score;
            livesEl.innerText = lives;
            gameoverEl.style.display = 'none';
            winEl.style.display = 'none';
            gameActive = true;

            player.x = canvas.width / 2 - 20;
            player.y = canvas.height - 90;
            player.targetX = null;
            player.targetY = null;

            spawnStrawberry();
            loop();
        }

        // Запускаем загрузку и старт игры
        loadAssets(() => {
            loadingEl.style.display = 'none';
            spawnStrawberry();
            loop();
        });
    </script>
</body>
</html>
